<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Add Student</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
        body {
            background: linear-gradient(to right, #f8fbff, #eef3f9);
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: #1f2937;
        }

        .navbar {
            background: linear-gradient(90deg, #0f172a, #1e293b);
        }

        .navbar-brand {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .page-title {
            font-size: 2rem;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 6px;
        }

        .page-subtitle {
            font-size: 1rem;
            color: #6b7280;
            margin-bottom: 0;
        }

        .form-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
            overflow: hidden;
        }

        .form-header {
            background: linear-gradient(135deg, #2563eb, #38bdf8);
            color: white;
            padding: 24px 28px;
        }

        .form-header h3 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        .form-body {
            padding: 30px;
            background: white;
        }

        .form-label {
            font-weight: 600;
            color: #334155;
            margin-bottom: 8px;
        }

        .form-control,
        .form-select {
            border-radius: 12px;
            padding: 12px 14px;
            border: 1px solid #dbe2ea;
            font-size: 0.98rem;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: #60a5fa;
            box-shadow: 0 0 0 0.2rem rgba(96, 165, 250, 0.2);
        }

        .text-danger {
            font-size: 0.9rem;
            margin-top: 6px;
        }

        .btn {
            border-radius: 10px;
            font-weight: 600;
            padding: 10px 18px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
  <div class="container">
    <a class="navbar-brand" href="/">Student Management System</a>
  </div>
</nav>

<div class="container py-4">
  <div class="mb-4">
    <h1 class="page-title">Add Student</h1>
    <p class="page-subtitle">Create a new student record with complete information.</p>
  </div>

  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card form-card">
        <div class="form-header">
          <h3>New Student Form</h3>
        </div>

        <div class="form-body">
          <form th:action="@{/saveStudent}" th:object="${student}" method="post">

            <div class="mb-3">
              <label class="form-label">Student ID</label>
              <input type="text" class="form-control" th:field="*{studentId}" placeholder="Enter student ID">
              <div class="text-danger" th:errors="*{studentId}"></div>
            </div>

            <div class="mb-3">
              <label class="form-label">Full Name</label>
              <input type="text" class="form-control" th:field="*{fullName}" placeholder="Enter full name">
              <div class="text-danger" th:errors="*{fullName}"></div>
            </div>

            <div class="mb-3">
              <label class="form-label">Gender</label>
              <select class="form-select" th:field="*{gender}">
                <option value="">-- Select Gender --</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
              </select>
              <div class="text-danger" th:errors="*{gender}"></div>
            </div>

            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" th:field="*{email}" placeholder="Enter email address">
              <div class="text-danger" th:errors="*{email}"></div>
            </div>

            <div class="mb-3">
              <label class="form-label">Phone</label>
              <input type="text" class="form-control" th:field="*{phone}" placeholder="Enter phone number">
              <div class="text-danger" th:errors="*{phone}"></div>
            </div>

            <div class="mb-4">
              <label class="form-label">Course</label>
              <input type="text" class="form-control" th:field="*{course}" placeholder="Enter course name">
              <div class="text-danger" th:errors="*{course}"></div>
            </div>

            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-success">Save Student</button>
              <a th:href="@{/}" class="btn btn-secondary">Back to Dashboard</a>
            </div>

          </form>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
